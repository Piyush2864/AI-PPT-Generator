version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-ppt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_ppt_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-ppt-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-ppt-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_ppt_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_this_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      AI_PROVIDER_API_KEY: ${AI_PROVIDER_API_KEY:-}
      AI_PROVIDER_MODEL: gemini-1.5-flash
      JOB_MAX_ATTEMPTS: 3
      JOB_BACKOFF_DELAY_MS: 2000
    ports:
      - '4000:4000'
    volumes:
      - exports_data:/app/storage/exports

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ai-ppt-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_ppt_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_this_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret}
      AI_PROVIDER_API_KEY: ${AI_PROVIDER_API_KEY:-}
      AI_PROVIDER_MODEL: gemini-1.5-flash
      JOB_MAX_ATTEMPTS: 3
      JOB_BACKOFF_DELAY_MS: 2000
    volumes:
      - exports_data:/app/storage/exports

volumes:
  postgres_data:
  exports_data:
